repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: validate-frontmatter
        name: Validate brief frontmatter
        entry: python scripts/validate_frontmatter.py
        language: system
        files: ^phase[1-4]-briefs/.*\.md$
        pass_filenames: false

      - id: gen-manifest
        name: Regenerate brief manifest
        entry: python scripts/gen_manifest.py
        language: system
        files: ^(phase[1-4]-briefs/.*\.md|docs/briefs/phase_pointer\.yaml)$
        pass_filenames: false

      - id: mypy-strict
        name: mypy --strict (backend)
        entry: bash -c 'cd backend && poetry run mypy src/vaultchain'
        language: system
        files: ^backend/src/.*\.py$
        pass_filenames: false

      - id: import-linter
        name: import-linter contracts
        entry: bash -c 'cd backend && poetry run lint-imports'
        language: system
        files: ^backend/src/.*\.py$
        pass_filenames: false

      - id: prettier
        name: prettier (frontend)
        entry: pnpm exec prettier --write
        language: system
        files: ^(web|apps/admin|shared-types)/.*\.(ts|tsx|json|css)$
