services:
  postgres:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: vaultchain
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: vaultchain
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultchain"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports: ["1025:1025", "8025:8025"]

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: kms
      DEBUG: 0
    ports: ["4566:4566"]

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "11155111", "--block-time", "2"]
    ports: ["8545:8545"]

  solana-validator:
    profiles: ["solana"]
    image: solanalabs/solana:stable
    command: solana-test-validator --reset --rpc-port 8899
    ports: ["8899:8899", "8900:8900"]

volumes:
  postgres-data:
