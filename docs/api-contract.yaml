components:
  parameters:
    IdempotencyKey:
      description: Opaque client-generated key (≤200 chars). Replays return the cached
        response; mismatched bodies on the same key return 422.
      in: header
      name: Idempotency-Key
      required: false
      schema:
        maxLength: 200
        type: string
  schemas:
    AuthRequestBody:
      additionalProperties: false
      properties:
        email:
          examples:
          - alice@example.com
          maxLength: 254
          minLength: 3
          title: Email
          type: string
        mode:
          $ref: '#/components/schemas/MagicLinkMode'
          examples:
          - signup
      required:
      - email
      - mode
      title: AuthRequestBody
      type: object
    AuthRequestResponse:
      additionalProperties: false
      example:
        message_sent: true
      properties:
        message_sent:
          examples:
          - true
          title: Message Sent
          type: boolean
      required:
      - message_sent
      title: AuthRequestResponse
      type: object
    AuthVerifyBody:
      additionalProperties: false
      properties:
        mode:
          $ref: '#/components/schemas/MagicLinkMode'
          examples:
          - signup
        token:
          examples:
          - ml-tok-abcdef0123456789
          minLength: 8
          title: Token
          type: string
      required:
      - token
      - mode
      title: AuthVerifyBody
      type: object
    AuthVerifyResponse:
      additionalProperties: false
      example:
        email: alice@example.com
        is_first_time: true
        pre_totp_token: pre-totp-abcdef0123456789
        requires_totp_challenge: false
        requires_totp_enrollment: true
        user_id: 11111111-1111-1111-1111-111111111111
      properties:
        email:
          examples:
          - alice@example.com
          maxLength: 254
          minLength: 3
          title: Email
          type: string
        is_first_time:
          examples:
          - true
          title: Is First Time
          type: boolean
        pre_totp_token:
          examples:
          - pre-totp-abcdef0123456789
          title: Pre Totp Token
          type: string
        requires_totp_challenge:
          examples:
          - false
          title: Requires Totp Challenge
          type: boolean
        requires_totp_enrollment:
          examples:
          - true
          title: Requires Totp Enrollment
          type: boolean
        user_id:
          examples:
          - 11111111-1111-1111-1111-111111111111
          format: uuid
          title: User Id
          type: string
      required:
      - user_id
      - email
      - is_first_time
      - requires_totp_enrollment
      - requires_totp_challenge
      - pre_totp_token
      title: AuthVerifyResponse
      type: object
    BackupCodesRegenerateResponse:
      additionalProperties: false
      example:
        backup_codes:
        - AAAA-BBBB-CCCC
        - DDDD-EEEE-FFFF
        - GGGG-HHHH-IIII
        - JJJJ-KKKK-LLLL
        - MMMM-NNNN-OOOO
        - PPPP-QQQQ-RRRR
        - SSSS-TTTT-UUUU
        - VVVV-WWWW-XXXX
        - YYYY-ZZZZ-AAAA
        - BBBB-CCCC-DDDD
      properties:
        backup_codes:
          examples:
          - - AAAA-BBBB-CCCC
            - DDDD-EEEE-FFFF
          items:
            type: string
          title: Backup Codes
          type: array
      required:
      - backup_codes
      title: BackupCodesRegenerateResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    MagicLinkMode:
      description: 'Magic-link request kind. Same string values the brief calls out

        so wire-format and tests stay readable.'
      enum:
      - signup
      - login
      title: MagicLinkMode
      type: string
    MeResponse:
      additionalProperties: false
      example:
        created_at: '2026-04-28T09:00:00+00:00'
        email: alice@example.com
        id: 11111111-1111-1111-1111-111111111111
        kyc_tier: 0
        status: verified
        totp_enrolled: true
      properties:
        created_at:
          examples:
          - '2026-04-28T09:00:00+00:00'
          format: date-time
          title: Created At
          type: string
        email:
          examples:
          - alice@example.com
          maxLength: 254
          minLength: 3
          title: Email
          type: string
        id:
          examples:
          - 11111111-1111-1111-1111-111111111111
          format: uuid
          title: Id
          type: string
        kyc_tier:
          examples:
          - 0
          title: Kyc Tier
          type: integer
        status:
          examples:
          - verified
          title: Status
          type: string
        totp_enrolled:
          examples:
          - true
          title: Totp Enrolled
          type: boolean
      required:
      - id
      - email
      - status
      - kyc_tier
      - totp_enrolled
      - created_at
      title: MeResponse
      type: object
    TotpEnrollConfirmBody:
      additionalProperties: false
      properties:
        code:
          examples:
          - '123456'
          maxLength: 8
          minLength: 6
          title: Code
          type: string
      required:
      - code
      title: TotpEnrollConfirmBody
      type: object
    TotpEnrollResponse:
      additionalProperties: false
      example:
        backup_codes:
        - AAAA-BBBB-CCCC
        - DDDD-EEEE-FFFF
        - GGGG-HHHH-IIII
        - JJJJ-KKKK-LLLL
        - MMMM-NNNN-OOOO
        - PPPP-QQQQ-RRRR
        - SSSS-TTTT-UUUU
        - VVVV-WWWW-XXXX
        - YYYY-ZZZZ-AAAA
        - BBBB-CCCC-DDDD
        qr_payload_uri: otpauth://totp/VaultChain:alice%40example.com?secret=JBSWY3DPEHPK3PXP&issuer=VaultChain
        secret_for_qr: JBSWY3DPEHPK3PXP
      properties:
        backup_codes:
          examples:
          - - AAAA-BBBB-CCCC
            - DDDD-EEEE-FFFF
          items:
            type: string
          title: Backup Codes
          type: array
        qr_payload_uri:
          examples:
          - otpauth://totp/VaultChain:alice%40example.com?secret=JBSWY3DPEHPK3PXP&issuer=VaultChain
          title: Qr Payload Uri
          type: string
        secret_for_qr:
          examples:
          - JBSWY3DPEHPK3PXP
          title: Secret For Qr
          type: string
      required:
      - secret_for_qr
      - qr_payload_uri
      - backup_codes
      title: TotpEnrollResponse
      type: object
    TotpVerifyBody:
      additionalProperties: false
      properties:
        code:
          examples:
          - '123456'
          maxLength: 64
          minLength: 6
          title: Code
          type: string
        use_backup_code:
          default: false
          examples:
          - false
          title: Use Backup Code
          type: boolean
      required:
      - code
      title: TotpVerifyBody
      type: object
    TotpVerifyResponse:
      additionalProperties: false
      description: 'Returned both on success and on a wrong-code path. The 403 lockout

        case is signalled via the error envelope, not this body.'
      example:
        success: true
      properties:
        attempts_remaining:
          anyOf:
          - type: integer
          - type: 'null'
          examples:
          - null
          title: Attempts Remaining
        success:
          examples:
          - true
          title: Success
          type: boolean
      required:
      - success
      title: TotpVerifyResponse
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  title: VaultChain API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/auth/logout:
    post:
      description: Revoke the current session and clear cookies.
      operationId: auth_logout_api_v1_auth_logout_post
      responses:
        '204':
          description: Successful Response
      summary: Revoke the current session
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      description: Rotate the refresh-token + access-token + CSRF cookies.
      operationId: auth_refresh_api_v1_auth_refresh_post
      parameters:
      - in: cookie
        name: vc_rt
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Vc Rt
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Rotate session cookies
      tags:
      - auth
  /api/v1/auth/request:
    post:
      description: 'Request a magic link for the supplied email / mode.


        Idempotent on email — calling twice creates two distinct magic

        links; both stay valid until consumed/expired. The HTTP idempotency

        middleware (``Idempotency-Key`` header) collapses verbatim retries

        into a single response.'
      operationId: auth_request_api_v1_auth_request_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequestBody'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRequestResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Issue a magic link
      tags:
      - auth
  /api/v1/auth/totp/backup-codes/regenerate:
    post:
      description: 'Recent-TOTP gating — V1 simply requires the session cookie; the

        ''recent TOTP'' nuance is a Phase 4 polish item per Risk/Friction in

        the brief. Phase 3 may layer in a step-up.'
      operationId: regenerate_backup_codes_api_v1_auth_totp_backup_codes_regenerate_post
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCodesRegenerateResponse'
          description: Successful Response
      summary: Regenerate the user's backup codes (replaces all 10)
      tags:
      - auth-totp
  /api/v1/auth/totp/enroll:
    post:
      description: 'Returns the secret/QR/backup codes exactly once. Bearer token
        is

        NOT consumed yet — the client also calls ``/enroll/confirm`` with

        the same token to actually mint the session.'
      operationId: totp_enroll_api_v1_auth_totp_enroll_post
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpEnrollResponse'
          description: Successful Response
      summary: Generate a fresh TOTP secret + 10 backup codes (one-shot)
      tags:
      - auth-totp
  /api/v1/auth/totp/enroll/confirm:
    post:
      description: 'Verify the freshly-typed code; on success mint a session and set

        cookies. The pre-TOTP token is evicted so a replay can''t mint a

        second session.'
      operationId: totp_enroll_confirm_api_v1_auth_totp_enroll_confirm_post
      parameters:
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpEnrollConfirmBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpVerifyResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Confirm enrollment with a code and mint a session
      tags:
      - auth-totp
  /api/v1/auth/totp/verify:
    post:
      description: 'On success mint a session + cookies; on miss return ``success=false``

        with ``attempts_remaining``; on lockout the use case raises

        ``UserLocked`` which the error envelope renders 403.'
      operationId: totp_verify_api_v1_auth_totp_verify_post
      parameters:
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpVerifyBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotpVerifyResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Verify a TOTP / backup code on the login flow
      tags:
      - auth-totp
  /api/v1/auth/verify:
    post:
      description: 'Consume the raw magic-link token; on success mint a 5-min Redis-cached

        pre-TOTP bearer token that gates the TOTP routes.'
      operationId: auth_verify_api_v1_auth_verify_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyBody'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Consume a magic link and mint a pre-TOTP token
      tags:
      - auth
  /api/v1/me:
    get:
      description: 'The simplest authenticated route — proves the cookie + cache

        pipeline works end-to-end.'
      operationId: me_api_v1_me_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: Successful Response
      summary: Return the authenticated user's profile
      tags:
      - me
  /healthz:
    get:
      operationId: healthz_healthz_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Healthz Healthz Get
                type: object
          description: Successful Response
      summary: Healthz
