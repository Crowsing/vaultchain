name: Bootstrap VM secrets (one-shot)

# Manual workflow: pipes 10 GH secrets into /etc/vaultchain/secrets/* on the
# Hetzner VM via SSH as root. Use once after Section 6.5 of BOOTSTRAP-RUNBOOK.md
# if local `echo "$VAR" > file` was executed without the env vars exported and
# the secret files ended up empty (1 byte = lone newline).
#
# After successful run, delete this workflow file.

on:
  workflow_dispatch: {}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@"$HOST" "echo connected as \$(id -un)"

      - name: Write secrets to VM
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          SUMSUB_APP_TOKEN: ${{ secrets.SUMSUB_APP_TOKEN }}
          SUMSUB_SECRET_KEY: ${{ secrets.SUMSUB_SECRET_KEY }}
          SUMSUB_WEBHOOK_SECRET: ${{ secrets.SUMSUB_WEBHOOK_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          set -euo pipefail
          write_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::secret $name is empty in GitHub — aborting"
              exit 1
            fi
            printf '%s' "$value" \
              | ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@"$HOST" \
                  "umask 077 && cat > /etc/vaultchain/secrets/$name && chmod 600 /etc/vaultchain/secrets/$name && chown root:root /etc/vaultchain/secrets/$name"
            echo "wrote $name"
          }
          write_secret postgres_password         "$POSTGRES_PASSWORD"
          write_secret secret_key                "$SECRET_KEY"
          write_secret master_key                "$MASTER_KEY"
          write_secret sumsub_app_token          "$SUMSUB_APP_TOKEN"
          write_secret sumsub_secret_key         "$SUMSUB_SECRET_KEY"
          write_secret sumsub_webhook_secret     "$SUMSUB_WEBHOOK_SECRET"
          write_secret anthropic_api_key         "$ANTHROPIC_API_KEY"
          write_secret google_ai_studio_api_key  "$GOOGLE_AI_STUDIO_API_KEY"
          write_secret resend_api_key            "$RESEND_API_KEY"
          write_secret telegram_bot_token        "$TG_BOT_TOKEN"

      - name: Verify all 10 secrets non-empty (no contents shown)
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@"$HOST" '
            set -e
            expected="postgres_password secret_key master_key sumsub_app_token sumsub_secret_key sumsub_webhook_secret anthropic_api_key google_ai_studio_api_key resend_api_key telegram_bot_token"
            fail=0
            for name in $expected; do
              f="/etc/vaultchain/secrets/$name"
              if [ ! -f "$f" ]; then
                echo "MISSING: $f"
                fail=1
                continue
              fi
              size=$(stat -c %s "$f")
              perm=$(stat -c %a "$f")
              if [ "$size" -lt 16 ]; then
                echo "TOO_SMALL: $f ($size bytes)"
                fail=1
              fi
              if [ "$perm" != "600" ]; then
                echo "BAD_PERMS: $f ($perm)"
                fail=1
              fi
              printf "%-30s %4s bytes  perms=%s\n" "$name" "$size" "$perm"
            done
            exit $fail
          '
