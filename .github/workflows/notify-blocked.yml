name: Notify Blocked

on:
  push:
    branches: [main]
    paths:
      - "phase[1-4]-briefs/blocked/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - name: Identify newly blocked
        id: blocked
        run: |
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep -E '^phase[1-4]-briefs/blocked/.*\.md$' || true)
          if [ -z "$NEW" ]; then exit 0; fi
          FIRST=$(echo "$NEW" | head -1)
          BRIEF_ID=$(basename "$FIRST" .md)
          REASON=$(awk '/^## What input is needed from the human/{getline; getline; print; exit}' "$FIRST" | head -c 200)
          echo "brief=$BRIEF_ID" >> "$GITHUB_OUTPUT"
          echo "file=$FIRST" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
      - name: Telegram notify
        if: steps.blocked.outputs.brief
        run: |
          MSG=$(cat <<EOF
          🚧 BLOCKED: ${{ steps.blocked.outputs.brief }}
          Reason: ${{ steps.blocked.outputs.reason }}
          File: ${{ github.server_url }}/${{ github.repository }}/blob/main/${{ steps.blocked.outputs.file }}
          EOF
          )
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
               -d chat_id="${{ secrets.TG_CHAT_ID }}" \
               -d parse_mode=Markdown \
               -d text="$MSG"
