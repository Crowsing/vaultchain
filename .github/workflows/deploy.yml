name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vaultchain-api

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vaultchain/web build
        env:
          VITE_API_BASE_URL: https://api.${{ secrets.USER_DOMAIN }}
      - run: pnpm --filter @vaultchain/admin build
        env:
          VITE_API_BASE_URL: https://api.${{ secrets.USER_DOMAIN }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist/

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-image, build-frontend]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: admin-dist
      - name: Compute lowercase image ref
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "VAULTCHAIN_IMAGE=${{ env.REGISTRY }}/${OWNER_LC}/vaultchain-api:sha-${{ github.sha }}" >> $GITHUB_ENV
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts
      - name: Sync frontend dist/ to VM
        run: |
          rsync -avz --delete web-dist/ deploy@${{ secrets.HETZNER_HOST }}:/opt/vaultchain/web-dist/
          rsync -avz --delete admin-dist/ deploy@${{ secrets.HETZNER_HOST }}:/opt/vaultchain/admin-dist/
      - name: Sync infra files (Caddyfile + docker-compose-prod.yml)
        run: |
          rsync -avz Caddyfile docker-compose-prod.yml scripts/deploy-server.sh \
                deploy@${{ secrets.HETZNER_HOST }}:/opt/vaultchain/
      - name: Login to GHCR on VM (short-lived job token)
        run: |
          ACTOR_LC=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | ssh deploy@${{ secrets.HETZNER_HOST }} \
                "docker login ghcr.io -u ${ACTOR_LC} --password-stdin"
      - name: Run deploy script on VM
        run: |
          ssh deploy@${{ secrets.HETZNER_HOST }} \
              "VAULTCHAIN_IMAGE=${{ env.VAULTCHAIN_IMAGE }} bash /opt/vaultchain/deploy-server.sh"
      - name: Healthz smoke
        run: |
          for i in {1..24}; do
            if curl -fsS "https://api.${{ secrets.USER_DOMAIN }}/healthz"; then exit 0; fi
            sleep 5
          done
          echo "/healthz never returned 200"
          exit 1
      - name: Telegram notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
               -d chat_id="${{ secrets.TG_CHAT_ID }}" \
               -d text="$ICON Deploy $STATUS — ${{ github.sha }}"
